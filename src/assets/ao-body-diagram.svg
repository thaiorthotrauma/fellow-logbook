    <!-- left leg -->
    <path d="M196,890 C192,930 190,955 194,978 L226,978 C230,955 230,930 226,890 Z" />
    <!-- right leg -->
    <path d="M332,890 C336,930 338,955 334,978 L302,978 C298,955 298,930 302,890 Z" />
    <!-- left foot -->
    <ellipse cx="196" cy="990" rx="34" ry="14" />
    <!-- right foot -->
    <ellipse cx="332" cy="990" rx="34" ry="14" />
  </g>
