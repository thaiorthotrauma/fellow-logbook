    <!-- left hand -->
    <ellipse cx="92" cy="540" rx="26" ry="34" />
    <!-- right hand -->
    <ellipse cx="430" cy="540" rx="26" ry="34" />
    <!-- pelvis -->
    <path d="M192,560 L336,560 L352,650 C340,690 300,712 264,712 C228,712 188,690 176,650 Z" />
