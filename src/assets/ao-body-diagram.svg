<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" role="img"
     aria-label="Anterior human body map used as a reference for AO anatomic regions">
  <defs>
    <style>
      .tissue { fill: #e9eeec; stroke: #b3c2bc; stroke-width: 1.5; stroke-linejoin: round; }
      .joint  { fill: #dce6e1; stroke: #b3c2bc; stroke-width: 1; }
      .inner  { fill: none; stroke: #cad7d1; stroke-width: 1.4; stroke-linecap: round; }
      .limb-o { fill: none; stroke: #b3c2bc; stroke-linecap: round; }
      .limb-f { fill: none; stroke: #e9eeec; stroke-linecap: round; }
    </style>
  </defs>

  <!-- ── Limbs: drawn as an outline stroke under a slightly narrower fill
       stroke, so each limb reads as a capsule with a soft border ── -->
  <g class="limb-o">
    <path d="M70,90 L56,178" stroke-width="22"/>
    <path d="M130,90 L144,178" stroke-width="22"/>
    <path d="M56,178 L50,250" stroke-width="17"/>
    <path d="M144,178 L150,250" stroke-width="17"/>
    <path d="M86,250 L82,316" stroke-width="30"/>
    <path d="M114,250 L118,316" stroke-width="30"/>
    <path d="M82,316 L78,384" stroke-width="23"/>
    <path d="M118,316 L122,384" stroke-width="23"/>
  </g>
  <g class="limb-f">
    <path d="M70,90 L56,178" stroke-width="18"/>
    <path d="M130,90 L144,178" stroke-width="18"/>
    <path d="M56,178 L50,250" stroke-width="13"/>
    <path d="M144,178 L150,250" stroke-width="13"/>
    <path d="M86,250 L82,316" stroke-width="26"/>
    <path d="M114,250 L118,316" stroke-width="26"/>
    <path d="M82,316 L78,384" stroke-width="19"/>
    <path d="M118,316 L122,384" stroke-width="19"/>
  </g>

  <!-- Hands & feet -->
  <ellipse class="tissue" cx="48" cy="264" rx="11" ry="15"/>
  <ellipse class="tissue" cx="152" cy="264" rx="11" ry="15"/>
  <ellipse class="tissue" cx="80" cy="392" rx="17" ry="9"/>
  <ellipse class="tissue" cx="120" cy="392" rx="17" ry="9"/>

  <!-- Torso (shoulders → waist), drawn over the arm tops -->
  <path class="tissue" d="M66,92 C74,80 88,76 100,76 C112,76 126,80 134,92
        L128,150 C126,175 122,194 116,208 L84,208 C78,194 74,175 72,150 Z"/>

  <!-- Pelvis, drawn over the thigh tops -->
  <path class="tissue" d="M84,205 L116,205 C124,213 126,228 120,242
        C115,252 108,258 100,258 C92,258 85,252 80,242 C74,228 76,213 84,205 Z"/>

  <!-- Neck & head -->
  <path class="tissue" d="M92,66 h16 v9 c0,4 -3,6 -8,6 c-5,0 -8,-2 -8,-6 z"/>
  <ellipse class="tissue" cx="100" cy="42" rx="24" ry="28"/>

  <!-- Ribcage & sternum suggestion inside the torso -->
  <g class="inner">
    <path d="M82,108 Q100,116 118,108"/>
    <path d="M80,124 Q100,133 120,124"/>
    <path d="M82,140 Q100,148 118,140"/>
    <path d="M100,102 L100,150"/>
  </g>

  <!-- Joints, on top to mask the limb/torso seams -->
  <g class="joint">
    <circle cx="70" cy="90" r="7"/>
    <circle cx="130" cy="90" r="7"/>
    <circle cx="56" cy="178" r="6"/>
    <circle cx="144" cy="178" r="6"/>
    <circle cx="50" cy="250" r="5"/>
    <circle cx="150" cy="250" r="5"/>
    <circle cx="86" cy="250" r="7"/>
    <circle cx="114" cy="250" r="7"/>
    <circle cx="82" cy="316" r="7"/>
    <circle cx="118" cy="316" r="7"/>
    <circle cx="78" cy="384" r="5"/>
    <circle cx="122" cy="384" r="5"/>
  </g>
</svg>
